<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virality — Grow Your Digital Authority</title>
  <link rel="icon" type="image/png" href="Logo/fav_icon.png" sizes="16x16" />
  <link rel="alternate icon" type="image/svg+xml" href="Logo/Logo.svg" />
  <meta name="description" content="Virality — build digital authority and grow your Instagram with real followers through strategic campaigns, positioning, and social proof." />
  <meta name="theme-color" content="#050507" />
  <!--
    Root entry. Default language is German. Visitors are routed to
    /de/ unless they explicitly choose /en/ via the in-page language
    switcher. The redirect uses both meta-refresh (works without JS)
    and JS replace (instant when JS is on, no extra history entry).
  -->
  <meta http-equiv="refresh" content="0; url=de/" />
  <link rel="canonical" href="de/" />
  <link rel="alternate" hreflang="de" href="de/" />
  <link rel="alternate" hreflang="en" href="en/" />
  <link rel="alternate" hreflang="x-default" href="de/" />
  <script>
    (function () {
      try {
        /* If user previously chose English, honour that preference. */
        var saved = null;
        try { saved = localStorage.getItem('virality.lang'); } catch (e) {}
        var target = (saved === 'en') ? 'en/' : 'de/';
        window.location.replace(target);
      } catch (e) {
        window.location.replace('de/');
      }
    })();
  </script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #050507;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    a { color: #C084FC; text-decoration: none; }
    p { font-size: 14px; opacity: 0.6; }
  </style>
</head>
<body>
  <p>Redirecting… <a href="de/">Deutsch</a> · <a href="en/">English</a></p>
</body>
</html>
